# Application Settings
spring.application.name=mathtutor-backend
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/repa_ab_1?useSSL=false&serverTimezone=Europe/Moscow&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=228abc228
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway Configuration
spring.flyway.enabled=false
#spring.flyway.baselineOnMigrate=true
#spring.flyway.locations=classpath:db/migration

# JWT Configuration
jwt.secret=your-super-secret-key-change-this-in-production-environment-very-important
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# Logging
logging.level.root=INFO
logging.level.com.mathtutor=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
